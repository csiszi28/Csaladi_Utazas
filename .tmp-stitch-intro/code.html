<style>
        body {
            background-color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes progress-shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .animate-progress {
            animation: progress-shimmer 2s infinite linear;
        }

        .reveal-up {
            animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes revealUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-pulse {
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
    </style>
</head>
<body class="bg-surface-container-lowest font-body-md text-on-surface">
<!-- Splash Content Wrapper -->
<main class="flex flex-grow flex-col items-center justify-center w-full max-w-screen-xl px-margin-mobile md:px-margin-desktop">
<!-- Center Identity -->
<div class="flex flex-col items-center space-y-md reveal-up" style="animation-delay: 0s;">
<!-- Logo Container -->

<!-- Brand Name -->
<h1 class="font-display-lg text-display-lg md:text-display-lg text-primary-container tracking-widest">F.A.M.</h1>
<!-- Secondary Brand Line -->
<p class="font-label-md text-label-md text-outline tracking-widest opacity-60">FAMILY ADVENTURE MANAGER</p>
</div>
</main>
<!-- Bottom Status Area -->
<footer class="w-full max-w-md pb-xl px-margin-mobile flex flex-col items-center space-y-sm reveal-up" style="animation-delay: 0.15s;">
<!-- Loading Text -->
<span class="font-label-md text-label-md text-outline-variant animate-pulse">
            Connecting...
        </span>
<!-- Subtle Progress Bar -->
<div class="relative w-48 h-[2px] bg-surface-container overflow-hidden rounded-full">
<div class="absolute inset-0 bg-primary w-1/3 animate-progress"></div>
</div>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Optional: simulate transition after 3 seconds
            setTimeout(() => {
                console.log("Navigation to home screen triggered.");
                // In a real app, this would trigger navigation:
                // window.location.href = '/home';
            }, 3500);
        });

        // Simple visibility check for reveal animations
        const revealElements = document.querySelectorAll('.reveal-up');
        revealElements.forEach((el, index) => {
            el.style.animationDelay = `${index * 0.15}s`;
        });
    </script>


</body></html>
